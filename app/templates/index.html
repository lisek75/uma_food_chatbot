<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMA Food ChatBot</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon">
</head>
<body>
    <header class="bg-danger text-white text-center py-4">
        <h1>UMA Food Chatbot</h1>
    </header>
    <main class="container my-3">
        <section class="menu">
            <h2 class="text-center text-danger">Menu</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="card mb-4">
                        <img src="/static/images/tuna_sushi.jpg" class="card-img-top" alt="Tuna Sushi">
                        <div class="card-body text-center">
                            <h5 class="card-title text-danger">Tuna Sushi</h5>
                            <p class="card-text">$6.00</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card mb-4">
                        <img src="/static/images/salmon_sushi.jpg" class="card-img-top" alt="Salmon Sushi">
                        <div class="card-body text-center">
                            <h5 class="card-title text-danger">Salmon Sushi</h5>
                            <p class="card-text">$7.00</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card mb-4">
                        <img src="/static/images/chirasi.jpg" class="card-img-top" alt="Chirasi">
                        <div class="card-body text-center">
                            <h5 class="card-title text-danger">Chirasi</h5>
                            <p class="card-text">$8.00</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section class="about-project">
            <h2 class="text-center text-danger">About the UMA Food Chatbot project</h2>
            <div id="about-project-content"></div>
        </section>
    </main>
    <footer class="bg-danger text-white text-center py-3">
        <p>UMA Food Chatbot Project (V1.0). Made with 💚</p>
    </footer>
    <!-- Chatbot integration -->
    <div class="chatbot-container">
        <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
        <df-messenger
            intent="WELCOME"
            chat-title="🤖🍣Uma Bot"
            agent-id="cfb5e6ec-7ece-4ded-b203-34678f650978"
            language-code="en"
        ></df-messenger>
    </div>
    <!-- Triggering the welcome intent on chat load -->
    <script>
        window.addEventListener('dfMessengerLoaded', function(event) {
            const dfMessenger = document.querySelector('df-messenger');
        });
    </script>
   <script>
        // Load the content of about_project.html into the div
        fetch('/about_project.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('about-project-content').innerHTML = data;
            });
    </script>
</body>
</html>
